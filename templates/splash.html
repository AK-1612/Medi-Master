{% extends "base.html" %}

{% block title %}Patient Evaluation | Medi-Master{% endblock %}

{% block content %}
<div class="hero-section">
    <div class="hero-content-col" style="flex: 1.5;">
        <h1 class="hero-title" style="font-size: 2.25rem;">Patient Diagnostic Record</h1>
        <p class="hero-subtitle">Complete the patient profile and confirm the selected symptom matrix to finalize the
            medical report.</p>

        <div class="card p-0" style="padding: 2.5rem;">
            <form action="{{ url_for('save_patient') }}" method="POST">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group mb-0">
                        <label for="name">Full Name</label>
                        <input type="text" name="name" id="name" required placeholder="Doe, Jane">
                    </div>

                    <div class="form-group mb-0">
                        <label for="age">Age</label>
                        <input type="number" name="age" id="age" required placeholder="Years">
                    </div>

                    <div class="form-group mb-0">
                        <label for="gender">Gender</label>
                        <select name="gender" id="gender" required>
                            <option value="" disabled selected>Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="form-group mb-0">
                        <label for="blood_group">Blood Group</label>
                        <select name="blood_group" id="blood_group">
                            <option value="" disabled selected>Select Type</option>
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                            <option>O+</option>
                            <option>O-</option>
                        </select>
                    </div>
                </div>

                <div class="form-group mt-3" style="margin-top: 1.5rem;">
                    <label for="allergies">Known Allergies (Optional)</label>
                    <input type="text" name="allergies" id="allergies" placeholder="e.g., Penicillin, Peanuts">
                </div>

                <div class="form-group mt-3" style="margin-top: 2rem;">
                    <label>Verify Symptom Matrix</label>
                    <div class="checkbox-grid">
                        {% for symptom in symptoms %}
                        <label class="checkbox-label">
                            <input type="checkbox" name="symptoms" value="{{ symptom }}">
                            <span>{{ symptom }}</span>
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <div class="mt-4" style="margin-top: 2.5rem;">
                    <button type="submit" class="btn btn-primary btn-block">Generate Clinical Report</button>
                </div>
            </form>
        </div>
    </div>

    <div class="hero-image-col">
        <img src="{{ url_for('static', filename='assets/red-cross.png') }}" alt="Medical Cross">
    </div>
</div>
{% endblock %}
