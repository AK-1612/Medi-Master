{% extends "base.html" %}

{% block title %}Patient Intake | Medi-Master{% endblock %}

{% block content %}
<div class="hero-section" style="justify-content: center;">
    <div class="card" style="width: 100%; max-width: 650px;">
        <h1 class="hero-title" style="font-size: 2rem; margin-bottom: 0.5rem; text-align: center;">Direct Patient Intake
        </h1>
        <p class="text-secondary mb-4 text-center">Register patient details to cross-reference with our medical
            database.</p>

        <form action="{{ url_for('save_patient') }}" method="post">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group mb-0">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Doe, John" required>
                </div>
                <div class="form-group mb-0">
                    <label>Age</label>
                    <input type="number" name="age" placeholder="Age in Years" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem;">
                <div class="form-group mb-0">
                    <label>Gender</label>
                    <input type="text" name="gender" placeholder="e.g., Male, Female" required>
                </div>
                <div class="form-group mb-0">
                    <label>Blood Group</label>
                    <input type="text" name="blood_group" placeholder="e.g., O+, A-">
                </div>
            </div>

            <div class="form-group mt-3" style="margin-top: 1.5rem;">
                <label>Known Allergies</label>
                <input type="text" name="allergies" placeholder="List any allergies here">
            </div>

            <div class="mt-4" style="margin-top: 2.5rem; text-align: center;">
                <button type="submit" class="btn btn-primary" style="padding-left: 3rem; padding-right: 3rem;">Submit to
                    Registry</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
